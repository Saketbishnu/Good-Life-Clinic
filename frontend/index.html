<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="/good-life.jpeg"/>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Goodlife-Clinic</title>

    <!-- Futuristic Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:0;
            overflow-x:hidden;
            background:#020617;
            font-family:'Poppins',sans-serif;
            color:white;
        }

        /* Animated futuristic background */

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:
                radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15), transparent 25%),
                radial-gradient(circle at 80% 80%, rgba(255,0,255,0.12), transparent 25%),
                radial-gradient(circle at center, rgba(59,130,246,0.12), transparent 40%);
            animation: animateBg 15s linear infinite;
            z-index:-2;
        }

        @keyframes animateBg{
            0%{
                transform:rotate(0deg) scale(1);
            }
            100%{
                transform:rotate(360deg) scale(1.1);
            }
        }

        /* Grid overlay */

        body::after{
            content:"";
            position:fixed;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size:40px 40px;
            z-index:-1;
        }

        /* Futuristic marquee */

        .marq{
            background:
                linear-gradient(
                    90deg,
                    rgba(0,10,40,0.95),
                    rgba(0,78,146,0.95),
                    rgba(0,10,40,0.95)
                );

            padding:14px 0;

            border-bottom:2px solid cyan;

            box-shadow:
                0 0 10px rgba(0,255,255,0.4),
                0 0 20px rgba(0,255,255,0.4),
                0 0 40px rgba(0,255,255,0.2);

            backdrop-filter: blur(10px);
        }

        .geek1,
        .geek2{
            display:inline-block;
            margin-right:100px;

            font-family:'Orbitron', sans-serif;

            font-size:18px;
            font-weight:bold;

            letter-spacing:3px;
            text-transform:uppercase;
        }

        .geek1{
            color:#00f7ff;

            text-shadow:
                0 0 5px #00f7ff,
                0 0 10px #00f7ff,
                0 0 20px #00f7ff,
                0 0 40px #00f7ff;
        }

        .geek2{
            color:#ff00ff;

            text-shadow:
                0 0 5px #ff00ff,
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff;
        }

        /* Floating particles */

        .particles{
            position:fixed;
            inset:0;
            overflow:hidden;
            z-index:-1;
        }

        .particles span{
            position:absolute;
            width:4px;
            height:4px;
            border-radius:50%;

            background:#00f7ff;

            box-shadow:
                0 0 10px #00f7ff,
                0 0 20px #00f7ff;

            animation: float 10s linear infinite;
        }

        .particles span:nth-child(1){
            left:10%;
            animation-duration:8s;
            top:100%;
        }

        .particles span:nth-child(2){
            left:25%;
            animation-duration:12s;
            top:100%;
        }

        .particles span:nth-child(3){
            left:40%;
            animation-duration:10s;
            top:100%;
        }

        .particles span:nth-child(4){
            left:60%;
            animation-duration:14s;
            top:100%;
        }

        .particles span:nth-child(5){
            left:75%;
            animation-duration:9s;
            top:100%;
        }

        .particles span:nth-child(6){
            left:90%;
            animation-duration:13s;
            top:100%;
        }

        @keyframes float{
            0%{
                transform:translateY(0) scale(0);
                opacity:0;
            }

            10%{
                opacity:1;
                transform:scale(1);
            }

            100%{
                transform:translateY(-120vh) scale(0.5);
                opacity:0;
            }
        }

        /* Root */

        #root{
            position:relative;
            z-index:2;
        }

    </style>

</head>

<body>

    <!-- Futuristic Top Banner -->

    <marquee class="marq" direction="left" loop="">

        <div class="geek1">
            🚀 Developer : Saket Bishnu
        </div>

        <div class="geek2">
            ⚡ Software Engineer
        </div>

        <div class="geek1">
            🧠 AI Powered Healthcare System
        </div>

        <div class="geek2">
            💙 Good Life Clinic
        </div>

    </marquee>

    <!-- Floating particles -->

    <div class="particles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- React App -->

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

</body>
</html>
